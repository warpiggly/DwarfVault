<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dott-y - Dwarf Vault</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hamburger menu icon (arriba a la izquierda) -->
    <div class="hamburger-menu" id="hamburger">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <!-- Hidden navigation menu (lado izquierdo) -->
    <div class="nav-menu" id="navMenu">
        <ul>
            <li><a href="index.html">🗃️ HOME</a></li>
            <li><a href="View Board.html">📜 TABLES</a></li>
            <li><a href="History.html">📖 TUTORIAL</a></li>
        </ul>
    </div>

    <div class="header">
        <h1 class="title">DWARF VAULT</h1>
        <img src="icons/Final Gif.gif" alt="Dott-y logo" class="logo" id="enanoGif">
        <h3 class="subtitle">Copy 🏔️ Text</h3>
    </div>

    <div>
        <div class="container2">
            <img src="image/Boton 3.png" alt="" class="background-image">
            <div class="texto-movible">
                <h2>RUNES ⚔️ <span style="color: #cccccc;"></span></h2>
            </div>
        </div>
        
        <!-- Información de la entrada seleccionada -->
        <div id="dbName" style="display: none;"></div>
        <div id="entryFavicon" class="copy">
            <!-- Sin src inicial para evitar un 404 silencioso al cargar el popup.
                 popup.js asignará src solo cuando haya un favicon seguro. -->
            <img id="faviconImg" alt="" style="width: 24px; height: 24px; display: none;">
        </div>
        <div id="entryIndex" class="copy">Index: Not available</div>
        <div id="entryText" class="copy">No text selected yet.</div>
        <div id="entryUrl" class="copy">No text selected yet.</div>
        <button id="copyButton" class="action-btn2">Copy Text</button>
    </div>

    <div class="container">
        <!-- FORGE Section -->
        <input type="checkbox" id="toggleForja" class="toggle">
        <label for="toggleForja" class="toggle-label">FORGE 🔨 <span style="color: #cccccc;"></span></label>
        <div class="toggle-content">

            <!-- 1. Dwarf Chamber: selector principal de base de datos (va primero porque todo depende de esto) -->
            <label for="databaseSelect" class="secundarios">🏛️ DWARF CHAMBER <span style="color: #cccccc;"> — Select a vault</span></label>
            <select id="databaseSelect" class="secundarios2">
                <option value="">Loading databases...</option>
            </select>

            <!-- 2. Database Management: agrupados en grid para mejor acceso visual -->
            <div class="forge-section">
                <p class="forge-section-title">MANAGEMENT</p>
                <div class="forge-btn-grid">
                    <button id="createParentDatabase" class="action-btn forge-btn">⛏️ NEW VAULT <span style="color: #cccccc;">Parent</span></button>
                    <button id="createChildDatabase" class="action-btn forge-btn">🔨 NEW CHEST <span style="color: #cccccc;">Child</span></button>
                    <button id="editDatabase" class="action-btn forge-btn">🛠️ REFORGE <span style="color: #cccccc;">Edit</span></button>
                    <button id="deleteDatabase" class="delete-btn forge-btn">💀 DESTROY <span style="color: #cccccc;">Delete</span></button>
                </div>
            </div>

            <!-- 3. Import/Export: unificados en una sola sección con dos filas -->
            <div class="forge-section">
                <p class="forge-section-title">TRADE — Import &amp; Export</p>
                <!-- Single database row -->
                <div class="forge-btn-row">
                    <button id="export-csv" class="action-btn forge-btn">📤 EXPORT <span style="color: #cccccc;">CSV</span></button>
                    <input type="file" id="importCSV" accept=".csv" style="display: none;">
                    <button id="importDatabase" class="action-btn forge-btn">📥 IMPORT <span style="color: #cccccc;">CSV</span></button>
                </div>
                <!-- Parent database row (con hijos) -->
                <div class="forge-btn-row">
                    <button id="export-parent" class="action-btn forge-btn">📦 EXPORT <span style="color: #cccccc;">Full Vault</span></button>
                    <input type="file" id="importParentFile" accept=".json" style="display: none;">
                    <button id="importParent" class="action-btn forge-btn">🗃️ IMPORT <span style="color: #cccccc;">Full Vault</span></button>
                </div>
            </div>

            <!-- 4. Quick Access: layout compacto con dos columnas y boton sync central -->
            <div class="forge-section">
                <p class="forge-section-title">QUICK ACCESS — Context Menu</p>
                <div class="quick-access-grid">
                    <!-- Columna izquierda: Favorites -->
                    <div class="quick-access-col">
                        <label for="favoritesDbSelect" class="secundarios quick-access-label">⭐ FAVORITES</label>
                        <select id="favoritesDbSelect" class="secundarios2">
                            <option value="">(None)</option>
                        </select>
                    </div>
                    <!-- Columna derecha: Links -->
                    <div class="quick-access-col">
                        <label for="linksDbSelect" class="secundarios quick-access-label">🔗 LINKS</label>
                        <select id="linksDbSelect" class="secundarios2">
                            <option value="">(None)</option>
                        </select>
                    </div>
                </div>
                <!-- Boton sync centrado debajo -->
                <button id="linkQuickAccess" class="action-btn" style="width:100%; margin-top: 8px;">⛓️ LINK — Sync Both</button>
            </div>

            <!-- 5. Settings: preferencias globales del usuario -->
            <div class="forge-section">
                <p class="forge-section-title">SETTINGS</p>
                <button id="toggleNotifications" class="action-btn" style="width:100%;">
                    🔔 NOTIFICATIONS — ON
                </button>
            </div>

            <!-- 6. Emoji Selector: utilidad secundaria al final -->
            <div id="emojiSelector" class="emoji-selector forge-section">
                <details id="emojiDropdown">
                    <summary style="cursor: pointer; font-size: 16px;">💎 Glyph Vault 💎 <span style="color: #cccccc;"> (click to expand)</span></summary>
                    <div id="emojiList" class="emoji-grid"></div>
                </details>
                <p id="emojiCopyFeedback" style="color: green; display: none;">Emoji copied!</p>
            </div>

        </div>
    
        <!-- RELICS Section -->
        <input type="checkbox" id="toggleReliquias" class="toggle">
        <label for="toggleReliquias" class="toggle-label">RELICS 🏰 <span style="color: #cccccc;"></span></label>
        <div class="toggle-content">
            <input type="text" id="searchBar" placeholder="Search by index or text...">
            <ul id="entriesList" class="entries-list"></ul>
        </div>
    </div>

    <!-- Scripts -->
    <script src="scripts/security.js"></script>
    <script src="scripts/notifications.js"></script>
    <script src="scripts/db.js"></script>
    <script src="popup.js"></script>
    <script src="scripts/Butons.js"></script>
    <script src="scripts/Menu.js"></script>
</body>
</html>
